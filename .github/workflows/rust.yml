name: Build dns_scanner

on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release?'
        required: false
        default: 'false'
        type: boolean
      release_tag:
        description: 'Release tag name (e.g. v1.0.0) — only used when creating a release manually'
        required: false
        default: ''
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build · ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:

          # ── Linux ──────────────────────────────────────────────────────────

          - name:           linux-amd64
            runner:         ubuntu-latest
            target:         x86_64-unknown-linux-musl
            use_cross:      false
            artifact_name:  dns_scanner-linux-amd64

          - name:           linux-arm64
            runner:         ubuntu-latest
            target:         aarch64-unknown-linux-musl
            use_cross:      true
            artifact_name:  dns_scanner-linux-arm64

          # ── macOS ──────────────────────────────────────────────────────────

          - name:           macos-intel
            runner:         macos-15-intel
            target:         x86_64-apple-darwin
            use_cross:      false
            artifact_name:  dns_scanner-macos-intel

          - name:           macos-arm64
            runner:         macos-latest
            target:         aarch64-apple-darwin
            use_cross:      false
            artifact_name:  dns_scanner-macos-arm64

          # ── Windows ────────────────────────────────────────────────────────

          - name:           windows-x64
            runner:         windows-latest
            target:         x86_64-pc-windows-msvc
            use_cross:      false
            artifact_name:  dns_scanner-windows-x64

          - name:           windows-x86
            runner:         windows-latest
            target:         i686-pc-windows-msvc
            use_cross:      false
            artifact_name:  dns_scanner-windows-x86

          - name:           windows-arm64
            runner:         windows-latest
            target:         aarch64-pc-windows-msvc
            use_cross:      false
            artifact_name:  dns_scanner-windows-arm64

    steps:

      # 1. Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Rust toolchain ──────────────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # 3. Cargo cache ─────────────────────────────────────────────────────────
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.target }}-

      # 4a. musl-tools for static Linux amd64 ─────────────────────────────────
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      # 4b. cross for cross-compiled targets ───────────────────────────────────
      - name: Install cross
        if: matrix.use_cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      # 5. Build ───────────────────────────────────────────────────────────────
      - name: Build (cargo)
        if: matrix.use_cross == false
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      # 6. Stage binary ────────────────────────────────────────────────────────
      - name: Stage binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/dns_scanner \
             staging/${{ matrix.artifact_name }}
          chmod +x staging/${{ matrix.artifact_name }}

      - name: Stage binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Copy-Item `
            "target\${{ matrix.target }}\release\dns_scanner.exe" `
            "staging\${{ matrix.artifact_name }}.exe"

      # 7. Strip debug symbols ─────────────────────────────────────────────────
      - name: Strip binary (Linux amd64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: strip staging/${{ matrix.artifact_name }}

      - name: Strip binary (macOS)
        if: runner.os == 'macOS'
        run: strip staging/${{ matrix.artifact_name }}

      # 8. Smoke test ──────────────────────────────────────────────────────────
      - name: Smoke test (Unix)
        if: runner.os != 'Windows' && matrix.use_cross == false
        run: staging/${{ matrix.artifact_name }} --help

      - name: Smoke test (Windows)
        if: |
          runner.os == 'Windows' &&
          matrix.target != 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: staging\${{ matrix.artifact_name }}.exe --help

      # 9. Upload ──────────────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: staging/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  #  Release — runs on version tags OR manual dispatch with create_release=true
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v') || inputs.create_release == true
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      # Determine the tag/version name to use in the release title
      - name: Resolve release name
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ inputs.release_tag || github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/

      - name: Flatten artifact directories
        run: |
          find release-assets -mindepth 2 -type f \
            -exec mv -t release-assets/ {} +
          find release-assets -mindepth 1 -maxdepth 1 -type d \
            -exec rm -rf {} +
          ls -lh release-assets/

      - name: Copy dns_manager.py
        run: cp dns_manager.py release-assets/dns_manager.py

      - name: Generate SHA-256 checksums
        working-directory: release-assets
        run: |
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: dns_scanner ${{ steps.tag.outputs.name }}
          tag_name: ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
          generate_release_notes: true
          files: release-assets/*
          body: |
            ## dns_scanner ${{ steps.tag.outputs.name }}

            | Platform | Architecture   | File |
            |----------|---------------|------|
            | Linux    | x86_64        | `dns_scanner-linux-amd64` |
            | Linux    | ARM64         | `dns_scanner-linux-arm64` |
            | macOS    | Intel         | `dns_scanner-macos-intel` |
            | macOS    | Apple Silicon | `dns_scanner-macos-arm64` |
            | Windows  | x64           | `dns_scanner-windows-x64.exe` |
            | Windows  | x86 (32-bit)  | `dns_scanner-windows-x86.exe` |
            | Windows  | ARM64         | `dns_scanner-windows-arm64.exe` |

            Also included: `dns_manager.py` · `SHA256SUMS.txt`

            ### OS tuning before scanning (Linux)
            ```bash
                        sudo sysctl -w net.core.rmem_max=134217728
                        sudo sysctl -w net.core.wmem_max=134217728
                        sudo sysctl -w net.core.netdev_max_backlog=500000
                        ulimit -n 65535
            ```
